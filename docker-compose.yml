services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: serveme-project:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnetion: Server=db,1433;Database=ServemeDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-ServeMe_Docker12345};Trust Server Certificate=true;MultipleActiveResultSets=true
    ports:
      - "8080:8080"

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-ServeMe_Docker12345}
    ports:
      - "1433:1433"
    volumes:
      - serveme-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  serveme-sql-data:
